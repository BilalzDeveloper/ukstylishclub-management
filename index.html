// ── DRIVE HELPERS ─────────────────────────────────────────────────────────────
async function driveList(folderId) {
  const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+(mimeType+contains+'image/')+and+trashed=false&fields=files(id,name,mimeType)&pageSize=100&access_token=${encodeURIComponent(cfg.driveToken)}`;
  const r = await fetch(url);
  if (r.status === 401) throw new Error("401");
  if (!r.ok) throw new Error(`Drive error ${r.status}`);
  const d = await r.json();
  return d.files || [];
}

async function driveDownloadB64(fileId, mimeType) {
  // Pass token as query param — avoids CORS preflight on Drive media downloads
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&access_token=${encodeURIComponent(cfg.driveToken)}`
  );
  if (r.status === 401) throw new Error("Drive token expired — refresh it in ⚙ Tokens");
  if (!r.ok) throw new Error(`Download failed ${r.status}`);
  const blob = await r.blob();
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

async function driveMoveToOnboarded(fileId, fileName, onboardedId) {
  const today = new Date().toISOString().slice(0,10);
  const newName = `${today}_${fileName}`;
  const token = encodeURIComponent(cfg.driveToken);
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/copy?access_token=${token}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName, parents: [onboardedId] })
  });
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?access_token=${token}`, {
    method: 'DELETE'
  });
}

// ── CLAUDE VISION ─────────────────────────────────────────────────────────────
async function analyseImage(b64, mimeType) {
  const prompt = `You are a fashion product analyst. Analyse this product image and return ONLY valid JSON (no markdown) with these exact fields:
{"productType":"one of [${PRODUCT_TYPES.map(t=>`"${t}"`).join(',')}] or Unknown","brand":"visible brand or Unknown","styleName":"model/style name or empty string","colours":["colour1"],"isFootwear":false,"confidence":"high or low","notes":"any flags"}`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': cfg.claudeKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mimeType, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  const d = await r.json();
  const txt = d.content?.find(b => b.type === 'text')?.text || '{}';
  try { return JSON.parse(txt.replace(/```json|```/g, '').trim()); }
  catch { return { productType:'Unknown', brand:'Unknown', styleName:'', colours:['Black'], isFootwear:false, confidence:'low', notes:'Parse error' }; }
}

// ── SHOPIFY HELPERS ───────────────────────────────────────────────────────────
async function shopifyGql(query, variables={}) {
  const r = await fetch(`https://${cfg.shopifyDomain}/admin/api/2024-01/graphql.json`, {
    method: 'POST',
    headers: { 'X-Shopify-Access-Token': cfg.shopifyToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, variables })
  });
  return r.json();
}

let _collectionCache = null;
async function getCollectionId(title) {
  if (!_collectionCache) {
    const d = await shopifyGql(`{ collections(first:100){ edges{ node{ id title } } } }`);
    _collectionCache = d.data?.collections?.edges || [];
  }
  const match = _collectionCache.find(e => e.node.title.toLowerCase().includes(title.toLowerCase()));
  return match?.node?.id || null;
}

async function stagedUpload(filename, mimeType, b64) {
  const d = await shopifyGql(`
    mutation stagedUploadsCreate($input:[StagedUploadInput!]!) {
      stagedUploadsCreate(input:$input) { stagedTargets { url resourceUrl parameters { name value } } }
    }`, { input:[{ filename, mimeType, resource:'IMAGE', httpMethod:'POST' }] });
  const target = d.data?.stagedUploadsCreate?.stagedTargets?.[0];
  if (!target) return null;
  const blob = await (await fetch(`data:${mimeType};base64,${b64}`)).blob();
  const form = new FormData();
  for (const p of target.parameters) form.append(p.name, p.value);
  form.append('file', blob, filename);
  await fetch(target.url, { method:'POST', body:form });
  return target.resourceUrl;
}

async function createProduct(prod) {
  const colours = prod.colours.split(',').map(c=>c.trim()).filter(Boolean);
  const sizes = prod.sizes.split(',').map(s=>s.trim()).filter(Boolean);
  const variants = [];
  for (const colour of colours)
    for (const size of sizes)
      variants.push({ price:prod.price, options:[size,colour], inventoryPolicy:'CONTINUE' });

  const mediaUrls = [];
  for (const img of prod.images) {
    try {
      const url = await stagedUpload(img.name, img.mimeType, img.b64);
      if (url) mediaUrls.push(url);
    } catch {}
  }

  const d = await shopifyGql(`
    mutation productCreate($input:ProductInput!,$media:[CreateMediaInput!]) {
      productCreate(input:$input,media:$media) {
        product { id title }
        userErrors { field message }
      }
    }`, {
    input:{
      title:prod.title, vendor:selectedVendor.name, productType:prod.productType,
      status:'ACTIVE', tags:[selectedVendor.name, prod.productType],
      variants, options:['Size','Colour']
    },
    media: mediaUrls.map(url=>({ originalSource:url, mediaContentType:'IMAGE' }))
  });

  const errors = d.data?.productCreate?.userErrors;
  if (errors?.length) throw new Error(errors.map(e=>e.message).join(', '));
  const productId = d.data?.productCreate?.product?.id;

  if (productId && prod.collection && !prod.collection.includes('⚠️')) {
    const colId = await getCollectionId(prod.collection);
    if (colId) {
      await shopifyGql(`
        mutation collectionAddProducts($id:ID!,$productIds:[ID!]!) {
          collectionAddProducts(id:$id,productIds:$productIds) { userErrors { message } }
        }`, { id:colId, productIds:[productId] });
    }
  }
  return productId;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
async function checkAllPending() {
  _collectionCache = null;
  const statusEl = document.getElementById('refresh-status');
  const refreshBtn = document.getElementById('btn-refresh');
  statusEl.textContent = 'Scanning all vendor folders…';
  refreshBtn.disabled = true;

  const results = await Promise.allSettled(VENDORS.map(v => driveList(v.pendingId)));
  let authFail = false;
  const grid = document.getElementById('vendor-grid');
  grid.innerHTML = '';

  results.forEach((r, i) => {
    const v = VENDORS[i];
    let count = 0, err = false;
    if (r.status === 'fulfilled') { count = r.value.length; }
    else { err = true; if (r.reason?.message?.includes('401')) authFail = true; }

    const card = document.createElement('div');
    card.className = 'vendor-card' + (count>0?' has-pending':'') + (err?' has-error':'');
    card.innerHTML = `
      <div class="vendor-name">${v.name}</div>
      <div class="vendor-count">${err ? '⚠️ error' : count+' pending'}</div>
      <button class="btn-sm" ${count===0?'disabled':''} onclick="startScan(${i})">${count>0?'Onboard →':'Empty'}</button>`;
    grid.appendChild(card);
  });

  const total = results.reduce((a,r)=>a+(r.status==='fulfilled'?r.value.length:0),0);
  statusEl.textContent = `${total} images pending across ${VENDORS.length} vendors`;
  refreshBtn.disabled = false;

  if (authFail) alert('⚠️ Drive token expired. Click ⚙ Tokens to refresh it.');
}

// ── SCAN ──────────────────────────────────────────────────────────────────────
function log(msg) {
  const box = document.getElementById('log-box');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

async function startScan(vendorIdx) {
  selectedVendor = VENDORS[vendorIdx];
  products = [];
  document.getElementById('log-box').innerHTML = '';
  showScreen('scan');
  document.getElementById('header-title').textContent = `Scanning ${selectedVendor.name}…`;

  try {
    log(`📁 Scanning ${selectedVendor.name} Pending folder…`);
    const files = await driveList(selectedVendor.pendingId);
    if (!files.length) { log('⚠️ No images found.'); return; }
    log(`✅ Found ${files.length} image(s). Downloading & analysing…`);

    const analysed = [];
    for (let i=0; i<files.length; i++) {
      const f = files[i];
      log(`🔍 (${i+1}/${files.length}) Analysing: ${f.name}`);
      const b64 = await driveDownloadB64(f.id, f.mimeType);
      const info = await analyseImage(b64, f.mimeType);
      analysed.push({...f, b64, info});
    }

    // Group by brand+type+style
    const groups = {};
    for (const img of analysed) {
      const key = `${img.info.brand}__${img.info.productType}__${img.info.styleName}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(img);
    }

    products = Object.entries(groups).map(([,imgs], idx) => {
      const s = imgs[0].info;
      const pType = s.productType;
      const collection = COLLECTION_MAP[pType] || '⚠️ Unknown';
      const isFootwear = s.isFootwear || FOOTWEAR_TYPES.includes(pType);
      const title = [selectedVendor.name, s.brand!=='Unknown'?s.brand:'', pType, s.styleName].filter(Boolean).join(' ');
      return { id:idx+1, title, productType:pType, collection,
        colours: s.colours?.join(', ') || 'Black',
        sizes: isFootwear ? SHOE_SIZES.join(', ') : CLOTHING_SIZES.join(', '),
        price:'', images:imgs, skip:false, confidence:s.confidence, notes:s.notes, isFootwear };
    });

    log(`✅ Identified ${products.length} distinct product(s). Building review…`);
    renderReview();
    showScreen('review');
    document.getElementById('header-title').textContent = `Review — ${selectedVendor.name}`;
  } catch(e) {
    log(`❌ Error: ${e.message}`);
  }
}

// ── REVIEW ────────────────────────────────────────────────────────────────────
function renderReview() {
  const list = document.getElementById('product-list');
  list.innerHTML = '';
  products.forEach((prod, idx) => {
    const card = document.createElement('div');
    card.className = 'product-card' + (prod.skip?' skipped':'');
    card.id = `card-${idx}`;

    const typeOptions = [...PRODUCT_TYPES,'Unknown'].map(t =>
      `<option value="${t}" ${t===prod.productType?'selected':''}>${t}</option>`).join('');

    card.innerHTML = `
      <div class="product-header">
        <span class="product-num">#${prod.id}</span>
        <span class="badge ${prod.confidence==='low'?'badge-low':'badge-high'}">${prod.confidence==='low'?'⚠️ Low confidence':'✓ Good'}</span>
        <button class="btn-xs" onclick="toggleSkip(${idx})">${prod.skip?'↩ Restore':'✕ Skip'}</button>
      </div>
      <div class="thumb-row">
        ${prod.images.map(img=>`<img class="thumb" src="data:${img.mimeType};base64,${img.b64}" alt="${img.name}"/>`).join('')}
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">Title</label>
          <input class="field-input" value="${prod.title}" onchange="products[${idx}].title=this.value"/></div>
        <div class="field"><label class="field-label">Type</label>
          <select class="field-input" onchange="updateType(${idx},this.value)">${typeOptions}</select></div>
        <div class="field"><label class="field-label">Collection</label>
          <input class="field-input" readonly value="${prod.collection}" id="col-${idx}"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">Colours</label>
          <input class="field-input" value="${prod.colours}" onchange="products[${idx}].colours=this.value"/></div>
        <div class="field"><label class="field-label">Sizes</label>
          <input class="field-input" value="${prod.sizes}" onchange="products[${idx}].sizes=this.value"/></div>
        <div class="field"><label class="field-label">Price (£)</label>
          <input class="field-input ${prod.price?'':'missing'}" value="${prod.price}" placeholder="Required"
            id="price-${idx}" onchange="products[${idx}].price=this.value;this.classList.toggle('missing',!this.value)"/></div>
      </div>
      ${prod.notes?`<div class="note-line">📝 ${prod.notes}</div>`:''}`;
    list.appendChild(card);
  });
  updateGoSummary();
}

function toggleSkip(idx) {
  products[idx].skip = !products[idx].skip;
  renderReview();
}
function updateType(idx, val) {
  products[idx].productType = val;
  products[idx].collection = COLLECTION_MAP[val] || '⚠️ Unknown';
  document.getElementById(`col-${idx}`).value = products[idx].collection;
}
function applyGlobalPrice() {
  const p = document.getElementById('global-price').value.trim();
  if (!p) return;
  products.forEach((prod,i) => {
    prod.price = p;
    const el = document.getElementById(`price-${i}`);
    if (el) { el.value = p; el.classList.remove('missing'); }
  });
  updateGoSummary();
}
function updateGoSummary() {
  const active = products.filter(p=>!p.skip);
  const imgs = active.reduce((a,p)=>a+p.images.length,0);
  document.getElementById('go-summary').textContent = `${active.length} products · ${imgs} images`;
}

// ── GO ────────────────────────────────────────────────────────────────────────
async function handleGo() {
  const active = products.filter(p=>!p.skip);
  const missing = active.find(p=>!p.price);
  if (missing) { alert(`Set a price for: ${missing.title}`); return; }

  showScreen('progress');
  doneLog = [];
  const list = document.getElementById('progress-list');
  list.innerHTML = '';

  const items = active.map(p => {
    const el = document.createElement('div');
    el.className = 'progress-item';
    el.innerHTML = `<span class="progress-icon" style="color:#555">○</span><span class="progress-title">${p.title}</span>`;
    list.appendChild(el);
    return el;
  });

  let created=0, archived=0;
  for (let i=0; i<active.length; i++) {
    const prod = active[i];
    const icon = items[i].querySelector('.progress-icon');
    icon.textContent='⏳'; icon.style.color='#facc15';
    try {
      await createProduct(prod);
      created++;
      icon.textContent='✓'; icon.style.color='#4ade80';
      for (const img of prod.images) {
        try { await driveMoveToOnboarded(img.id, img.name, selectedVendor.onboardedId); archived++; } catch {}
      }
    } catch(e) {
      icon.textContent='✕'; icon.style.color='#f87171';
      const errEl = document.createElement('span');
      errEl.className='progress-error'; errEl.textContent=e.message;
      items[i].appendChild(errEl);
    }
  }

  doneLog.push(`✅ ${created} products created, ${archived} images archived to Onboarded.`);
  document.getElementById('done-log').innerHTML = doneLog.map(l=>`<div>${l}</div>`).join('');
  showScreen('done');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadSaved();
if (cfg.driveToken && cfg.shopifyToken && cfg.claudeKey) {
  document.getElementById('inp-drive').value = cfg.driveToken;
  document.getElementById('inp-shopify').value = cfg.shopifyToken;
  document.getElementById('inp-domain').value = cfg.shopifyDomain;
  document.getElementById('inp-claude').value = cfg.claudeKey;
  showScreen('dashboard');
  checkAllPending();
} else {
  showScreen('setup');
}
</script>
